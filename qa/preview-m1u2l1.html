<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m1u2 L1 문항 풀 미리보기</title>
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/ui.css" />
    <link rel="stylesheet" href="/src/styles/math.css" />
    <style>
      :root { color-scheme: light; }
      html, body { height: auto; min-height: 100%; overflow-x: hidden; overflow-y: auto; }
      body { margin: 0; background: #f3f1fb; color: #26334d; font-family: Pretendard, "Noto Sans KR", sans-serif; }
      .top { position: sticky; top: 0; z-index: 10; padding: 18px 24px; background: rgba(255,255,255,.94); border-bottom: 1px solid #ded9f2; backdrop-filter: blur(12px); }
      .top h1 { margin: 0 0 5px; font-size: 22px; }
      .top p { margin: 0; color: #69738a; font-size: 13px; }
      .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      .filters button { border: 1px solid #cfc8ec; border-radius: 999px; padding: 7px 12px; background: #fff; color: #55458f; font-weight: 800; cursor: pointer; }
      .filters button.on { color: #fff; background: #7058c7; border-color: #7058c7; }
      main { max-width: 980px; margin: 0 auto; padding: 24px 18px 80px; display: grid; gap: 18px; }
      .q { background: #fff; border: 1px solid #e0dcef; border-radius: 18px; box-shadow: 0 7px 24px rgba(63,46,120,.08); overflow: hidden; }
      .qhead { display: flex; align-items: center; gap: 8px; padding: 14px 18px; border-bottom: 1px solid #eeeaf8; }
      .qid { font-weight: 950; color: #49348e; }
      .tag { border-radius: 999px; padding: 4px 8px; font-size: 11px; font-weight: 900; background: #eee9ff; color: #654bad; }
      .body { padding: 19px; }
      .prompt { font-size: 17px; line-height: 1.68; font-weight: 750; }
      .figure { margin: 16px auto; max-width: 420px; }
      .opts { display: grid; gap: 9px; margin-top: 15px; }
      .opt { width: 100%; display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; padding: 11px 13px; border: 1px solid #e1deeb; border-radius: 12px; background: #fbfaff; line-height: 1.48; text-align: left; }
      .opt.correct { border-color: #36a468; background: #ebfaef; }
      .answer-ui { margin-top: 15px; }
      .toggle { margin-top: 16px; border: 0; border-radius: 11px; padding: 10px 14px; background: #6f56c7; color: #fff; font-weight: 900; cursor: pointer; }
      .review { display: none; margin-top: 15px; border-top: 1px dashed #d8d2ec; padding-top: 15px; line-height: 1.7; font-size: 14px; }
      .review.show { display: block; }
      .answer { margin-bottom: 10px; font-weight: 950; color: #23834d; }
      .review .xh { display: block; margin: 12px 0 4px; color: #5b43ac; font-weight: 950; }
      .core { margin-top: 12px; border-radius: 10px; padding: 10px 12px; background: #f0edfb; color: #59459c; font-weight: 850; }
      @media (max-width: 640px) { .top { padding: 14px; } main { padding: 14px 10px 60px; } .body { padding: 15px; } }
    </style>
  </head>
  <body>
    <header class="top">
      <h1>중1 II. 문자와 식, L1 문항 풀</h1>
      <p>정본 후보 22문항 · 실제 데이터에서 렌더링 · 버튼을 누르면 정답과 해설이 표시됩니다.</p>
      <nav class="filters" id="filters"></nav>
    </header>
    <main id="root"></main>
    <script type="module">
      import { POOL_M1U2L1 } from "/src/content/exams/m1u2l1.ts";
      import { makeAnswerPad } from "/src/ui/mathKit.ts";

      const root = document.querySelector("#root");
      const filters = document.querySelector("#filters");
      const labels = { all: "전체 22", mcq: "객관식", multi: "복수 선택", num: "수치 단답", word: "용어" };
      let active = "all";

      function answerText(item) {
        if (item.type === "mcq") return item.options[item.answer];
        if (item.type === "multi") return item.answer.map((i) => item.options[i]).join(" / ");
        return `${item.answer}${item.unitLabel ? ` ${item.unitLabel}` : ""}`;
      }

      function render() {
        root.innerHTML = "";
        const items = active === "all" ? POOL_M1U2L1 : POOL_M1U2L1.filter((item) => item.type === active);
        items.forEach((item) => {
          const card = document.createElement("article");
          card.className = "q";
          const options = item.options?.map((option, index) => `<button type="button" class="opt" data-index="${index}"><span>${option}</span><span class="radio">✓</span></button>`).join("") ?? "";
          card.innerHTML = `
            <div class="qhead"><span class="qid">${item.id}</span><span class="tag">${item.type}</span></div>
            <div class="body">
              <div class="prompt">${item.prompt}</div>
              ${item.figure ? `<div class="figure">${item.figure}</div>` : ""}
              ${options ? `<div class="opts ex-opts">${options}</div>` : `<div class="answer-ui"></div>`}
              <button class="toggle" type="button">정답·해설 보기</button>
              <div class="review"><div class="answer">정답: ${answerText(item)}</div>${item.explain}<div class="core">핵심: ${item.core}</div></div>
            </div>`;
          const answerUi = card.querySelector(".answer-ui");
          if (item.type === "num" && answerUi) {
            const pad = makeAnswerPad(item.numKind ?? "int", () => {});
            const row = document.createElement("div");
            row.className = "ex-num-row";
            row.append(pad.ansEl);
            if (item.unitLabel) {
              const unit = document.createElement("span");
              unit.className = "ex-unit";
              unit.textContent = item.unitLabel;
              row.append(unit);
            }
            answerUi.append(row, pad.padEl);
          } else if (item.type === "word" && answerUi) {
            const bank = [...(item.bank ?? [])].sort(() => Math.random() - 0.5);
            const grid = document.createElement("div");
            grid.className = "ex-bank";
            bank.forEach((word) => {
              const chip = document.createElement("button");
              chip.type = "button";
              chip.className = "ex-chip";
              chip.textContent = word;
              chip.addEventListener("click", () => {
                grid.querySelectorAll(".ex-chip").forEach((el) => el.classList.remove("sel"));
                chip.classList.add("sel");
              });
              grid.append(chip);
            });
            answerUi.append(grid);
          }
          const button = card.querySelector(".toggle");
          const review = card.querySelector(".review");
          button.addEventListener("click", () => {
            const open = review.classList.toggle("show");
            button.textContent = open ? "정답·해설 닫기" : "정답·해설 보기";
            if (open && item.options) {
              const answers = Array.isArray(item.answer) ? item.answer : [item.answer];
              answers.forEach((index) => card.querySelector(`.opt[data-index="${index}"]`)?.classList.add("correct"));
            } else card.querySelectorAll(".correct").forEach((el) => el.classList.remove("correct"));
          });
          root.append(card);
        });
      }

      Object.entries(labels).forEach(([key, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = label;
        button.className = key === active ? "on" : "";
        button.addEventListener("click", () => {
          active = key;
          filters.querySelectorAll("button").forEach((el) => el.classList.toggle("on", el === button));
          render();
        });
        filters.append(button);
      });
      render();
    </script>
  </body>
</html>
