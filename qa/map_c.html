<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#E7EBF0}</style></head><body><div class="atlas-root">
  <style>
    .atlas-root{
      --blue:#3182F6; --blue-deep:#1B64DA; --ink:#191F28;
      --paper:#F2F4F7; --green:#12B886;
      --line:#D7DDE5; --muted:#8B95A1;
      max-width:402px; margin:0 auto; position:relative;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
      color:var(--ink);
      background:radial-gradient(120% 60% at 50% -10%, #FBFDFE 0%, #EEF3F6 55%, #E7EEF2 100%);
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
    }
    .atlas-root *{box-sizing:border-box;}
    .atlas-bg{position:absolute; inset:0; z-index:0; pointer-events:none;}
    .atlas-scroll{position:relative; z-index:2; padding:0 0 108px;}

    .topbar{position:relative; z-index:3; padding:16px 20px 8px; display:flex; align-items:center; justify-content:space-between;}
    .brand{display:flex; align-items:center; gap:9px;}
    .brand-mark{width:34px; height:34px; border-radius:11px; background:linear-gradient(145deg,#3B8BFF,#1B64DA);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 5px 14px rgba(49,130,246,.38), inset 0 1px 0 rgba(255,255,255,.4);}
    .brand-name{font-size:19px; font-weight:800; letter-spacing:-.5px;}
    .brand-name b{color:var(--blue);}
    .streak{display:flex; align-items:center; gap:5px; background:#fff; border:1px solid var(--line);
      padding:6px 11px 6px 8px; border-radius:20px; font-size:13px; font-weight:700; color:var(--ink);
      box-shadow:0 3px 10px rgba(25,31,40,.06);}

    .banner{position:relative; z-index:3; margin:6px 16px 4px; border-radius:20px; overflow:hidden;
      background:linear-gradient(135deg,#245BC4 0%,#3182F6 52%,#4B93FF 100%);
      box-shadow:0 14px 30px -10px rgba(43,102,214,.55), inset 0 1px 0 rgba(255,255,255,.18);
      color:#fff; padding:16px 18px 15px;}
    .banner .compass-deco{position:absolute; right:-14px; top:-16px;}
    .banner-kicker{font-size:11px; font-weight:800; letter-spacing:1.4px; color:#CFE0FF;
      display:flex; align-items:center; gap:6px; margin-bottom:7px;}
    .banner-kicker .dot{width:5px; height:5px; border-radius:50%; background:#9CC2FF;}
    .banner-title{font-size:19px; font-weight:800; letter-spacing:-.4px; line-height:1.28; max-width:260px;}
    .banner-foot{display:flex; align-items:center; gap:10px; margin-top:13px;}
    .prog-track{flex:1; height:7px; border-radius:6px; background:rgba(255,255,255,.24); overflow:hidden;}
    .prog-fill{width:33%; height:100%; border-radius:6px; background:linear-gradient(90deg,#BFE3FF,#fff); box-shadow:0 0 8px rgba(255,255,255,.6);}
    .prog-label{font-size:12px; font-weight:800; color:#EAF2FF; white-space:nowrap;}

    .mapwrap{position:relative; z-index:2; margin-top:2px;}
    .map-svg{display:block; width:100%; height:auto;}

    .node-labels{position:absolute; inset:0; z-index:3; pointer-events:none;}
    .nlabel{position:absolute; transform:translate(-50%,0); text-align:center;}
    .nlabel .tag{display:inline-block; font-size:13px; font-weight:800; letter-spacing:-.3px;
      padding:5px 11px; border-radius:12px; background:#fff;
      box-shadow:0 5px 14px rgba(25,31,40,.12); border:1px solid rgba(215,221,229,.9);
      color:var(--ink); white-space:nowrap;}
    .nlabel.locked .tag{background:#EEF1F4; color:#AEB6C0; box-shadow:0 3px 8px rgba(25,31,40,.05); border-color:#E4E8EC;}
    .nlabel.current .tag{background:var(--blue); color:#fff; box-shadow:0 8px 18px rgba(49,130,246,.4); border:none;}
    .nlabel .sub{display:block; margin-top:4px; font-size:10.5px; font-weight:700; color:var(--muted); letter-spacing:.2px;}
    .nlabel.current .sub{color:var(--blue-deep);}

    .cta-cue{position:absolute; z-index:4; transform:translate(-50%,0);
      background:var(--ink); color:#fff; font-size:11px; font-weight:800;
      padding:6px 12px; border-radius:20px; white-space:nowrap; box-shadow:0 8px 18px rgba(25,31,40,.3);}
    .cta-cue::after{content:""; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%) rotate(45deg);
      width:10px; height:10px; background:var(--ink); border-radius:2px;}

    .tabbar{position:absolute; left:0; right:0; bottom:0; z-index:6; max-width:402px; margin:0 auto;
      background:rgba(255,255,255,.9); backdrop-filter:blur(14px); border-top:1px solid var(--line);
      padding:9px 22px calc(9px + env(safe-area-inset-bottom)); display:flex; justify-content:space-between; align-items:center;}
    .tab{display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; font-weight:700; color:var(--muted);}
    .tab.on{color:var(--blue);}
    .tab .ic{width:24px; height:24px; display:flex; align-items:center; justify-content:center;}
  </style>
