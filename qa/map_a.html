<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#E7EBF0}</style></head><body><style>
  .tq-wrap *{box-sizing:border-box;margin:0;padding:0;}
  .tq-wrap{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    max-width:402px;margin:0 auto;position:relative;
    background:linear-gradient(180deg,#E9F7EF 0%,#DBF0E4 22%,#CFEAD9 60%,#C5E6D2 100%);
    color:#191F28;overflow:hidden;border-radius:28px;
    box-shadow:0 24px 60px -18px rgba(18,32,45,.32);
  }
  /* soft rolling hills backdrop */
  .tq-hills{position:absolute;inset:0;z-index:0;pointer-events:none;}
  /* ---------- Top bar ---------- */
  .tq-top{position:relative;z-index:5;padding:16px 18px 10px;}
  .tq-brandrow{display:flex;align-items:center;justify-content:space-between;}
  .tq-brand{display:flex;align-items:center;gap:9px;}
  .tq-logo{width:34px;height:34px;border-radius:11px;
    background:linear-gradient(150deg,#5AA0FF,#3182F6 60%,#1E6BE0);
    box-shadow:0 6px 14px -4px rgba(49,130,246,.6),inset 0 1px 0 rgba(255,255,255,.55);
    display:flex;align-items:center;justify-content:center;}
  .tq-logo svg{display:block;}
  .tq-brand b{font-size:20px;letter-spacing:-.5px;font-weight:800;color:#191F28;}
  .tq-chips{display:flex;gap:7px;}
  .tq-chip{display:flex;align-items:center;gap:4px;background:#fff;border-radius:999px;
    padding:6px 11px 6px 8px;font-size:13px;font-weight:800;
    box-shadow:0 4px 10px -4px rgba(18,32,45,.22),inset 0 0 0 1px rgba(18,32,45,.04);}
  .tq-chip .ico{width:17px;height:17px;display:flex;align-items:center;justify-content:center;}
  .tq-chip.streak{color:#FF7A00;}
  .tq-chip.gem{color:#3182F6;}
  /* ---------- Unit banner ---------- */
  .tq-banner{position:relative;z-index:5;margin:12px 14px 6px;
    border-radius:20px;padding:15px 16px;color:#fff;overflow:hidden;
    background:linear-gradient(135deg,#4C97FF 0%,#3182F6 52%,#1F6BE5 100%);
    box-shadow:0 14px 26px -10px rgba(49,130,246,.62),inset 0 1px 0 rgba(255,255,255,.35);}
  .tq-banner .glow{position:absolute;right:-30px;top:-46px;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.4),rgba(255,255,255,0) 70%);}
  .tq-banner .kbadge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.4px;
    background:rgba(255,255,255,.22);padding:3px 9px;border-radius:999px;margin-bottom:8px;}
  .tq-banner h2{font-size:17px;font-weight:800;letter-spacing:-.4px;line-height:1.3;}
  .tq-banner .prog{margin-top:11px;display:flex;align-items:center;gap:9px;}
  .tq-bar{flex:1;height:9px;border-radius:999px;background:rgba(255,255,255,.28);overflow:hidden;}
  .tq-bar i{display:block;height:100%;width:34%;border-radius:999px;
    background:linear-gradient(90deg,#FFE9A8,#FFD24D);box-shadow:0 0 8px rgba(255,214,77,.7);}
  .tq-banner .pct{font-size:12px;font-weight:800;white-space:nowrap;}
  /* ---------- Map ---------- */
  .tq-map{position:relative;z-index:4;height:640px;}
  .tq-map svg{position:absolute;inset:0;width:100%;height:100%;display:block;}
  /* Node overlay labels (HTML for crisp korean text) */
  .tq-node-label{position:absolute;z-index:6;transform:translate(-50%,0);
    text-align:center;pointer-events:none;width:150px;}
  .tq-node-label .t{font-size:13px;font-weight:800;letter-spacing:-.3px;color:#191F28;
    text-shadow:0 1px 0 rgba(255,255,255,.9);line-height:1.25;}
  .tq-node-label .s{font-size:11px;font-weight:700;margin-top:1px;}
  .tq-node-label.locked .t{color:#8B95A1;}
  .tq-node-label.locked .s{color:#ADB5BD;}
  /* START ribbon */
  .tq-start{position:absolute;z-index:8;transform:translate(-50%,-50%);
    background:#fff;border-radius:14px;padding:7px 15px;font-size:13px;font-weight:900;
    letter-spacing:.5px;color:#3182F6;white-space:nowrap;
    box-shadow:0 10px 20px -6px rgba(49,130,246,.5),inset 0 0 0 2px rgba(49,130,246,.14);}
  .tq-start:after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
    border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #fff;}
  /* bottom nav */
  .tq-nav{position:relative;z-index:9;display:flex;justify-content:space-around;align-items:center;
    background:rgba(255,255,255,.92);backdrop-filter:blur(6px);padding:11px 8px 13px;
    box-shadow:0 -6px 18px -8px rgba(18,32,45,.18),inset 0 1px 0 rgba(18,32,45,.05);}
  .tq-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10px;font-weight:800;color:#B0B8C1;text-decoration:none;}
  .tq-nav a.on{color:#3182F6;}
  .tq-nav a .ni{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
</style>

<div class="tq-wrap">

  <!-- rolling hills backdrop -->
  <svg class="tq-hills" viewBox="0 0 402 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="tqHillA" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#CDEBD8"/><stop offset="1" stop-color="#BCE3CB"/>
      </linearGradient>
      <linearGradient id="tqHillB" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#B7E2C7"/><stop offset="1" stop-color="#A6D9B9"/>
      </linearGradient>
    </defs>
    <path d="M-20,150 Q120,90 250,160 T440,150 V900 H-20 Z" fill="url(#tqHillA)" opacity=".55"/>
    <path d="M-20,340 Q140,270 260,350 T440,330 V900 H-20 Z" fill="url(#tqHillB)" opacity=".5"/>
    <path d="M-20,560 Q120,500 250,580 T440,560 V900 H-20 Z" fill="#AEDCC0" opacity=".45"/>
  </svg>

  <!-- top bar -->
  <div class="tq-top">

      <div class="tq-brand">
        <span class="tq-logo">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <path d="M12 2.5c-1 4-3.5 5.5-6.5 6.2 3 .7 5.5 2.2 6.5 6.2 1-4 3.5-5.5 6.5-6.2C15.5 8 13 6.5 12 2.5Z" fill="#fff"/>
            <circle cx="18" cy="18" r="2.4" fill="#fff" opacity=".9"/>
            <circle cx="6" cy="17" r="1.5" fill="#fff" opacity=".7"/>

        </span>
        <span class="tq-chip gem">
          <span class="ico"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M6 3h12l3 5-9 13L3 8l3-5Z" fill="#3182F6"/><path d="M6 3h12l-6 5L6 3Z" fill="#6FB0FF"/><path d="M3 8h18l-9 13L3 8Z" fill="#2E77E8" opacity=".9"/></svg></span>240
        </span>
      </div>
    </div>
  </div>

  <!-- unit banner -->
  <div class="tq-banner">
    <span class="glow"></span>
    <span class="kbadge">대단원 I</span>
    <h2>과학과 인류의<br>지속가능한 삶</h2>
    <div class="prog">
      <span class="tq-bar"><i></i></span>
      <span class="pct">2 / 6 완료</span>
    </div>
  </div>

  <!-- MAP -->
  <div class="tq-map">
    <svg viewBox="0 0 402 640" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- path gradients -->
        <linearGradient id="tqPathDone" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#3182F6"/><stop offset="1" stop-color="#5AA0FF"/>
        </linearGradient>
        <!-- node medallions -->
        <radialGradient id="tqGold" cx="35%" cy="28%" r="80%">
          <stop offset="0" stop-color="#FFF0B8"/><stop offset="45%" stop-color="#FFD34D"/>
          <stop offset="100%" stop-color="#F2A81E"/>
        </radialGradient>
        <radialGradient id="tqGoldRim" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#FFE58A"/><stop offset="100%" stop-color="#D98E14"/>
        </radialGradient>
        <radialGradient id="tqBlue" cx="35%" cy="26%" r="82%">
          <stop offset="0" stop-color="#8FC0FF"/><stop offset="42%" stop-color="#3182F6"/>
          <stop offset="100%" stop-color="#175FCC"/>
        </radialGradient>
        <radialGradient id="tqBlueRim" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#7DB4FF"/><stop offset="100%" stop-color="#124EAB"/>
        </radialGradient>
        <radialGradient id="tqGray" cx="35%" cy="28%" r="82%">
          <stop offset="0" stop-color="#FDFEFF"/><stop offset="48%" stop-color="#E4E9EF"/>
          <stop offset="100%" stop-color="#C4CDD6"/>
        </radialGradient>
        <radialGradient id="tqGrayRim" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#EEF2F6"/><stop offset="100%" stop-color="#AEB8C3"/>
        </radialGradient>
        <!-- tree / props -->
        <linearGradient id="tqTree" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#3FBE7A"/><stop offset="1" stop-color="#1E9E5C"/>
        </linearGradient>
        <linearGradient id="tqTree2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#5AD08D"/><stop offset="1" stop-color="#2CAE6B"/>
        </linearGradient>
        <linearGradient id="tqRock" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#B8C2CC"/><stop offset="1" stop-color="#8C97A3"/>
        </linearGradient>
        <filter id="tqShadow" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#12202D" flood-opacity="0.28"/>
        </filter>
        <filter id="tqSoft" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#12202D" flood-opacity="0.18"/>
        </filter>
      </defs>

      <!-- ===== The winding trail ===== -->
      <!-- back (upcoming, faded) segment -->
      <path d="M201,80 C300,150 300,190 201,255
               C110,315 110,360 201,420
               C300,480 300,520 201,585"
            fill="none" stroke="#CBD5DF" stroke-width="26" stroke-linecap="round" opacity=".7"/>
      <path d="M201,80 C300,150 300,190 201,255
               C110,315 110,360 201,420
               C300,480 300,520 201,585"
            fill="none" stroke="#E4EAF0" stroke-width="15" stroke-linecap="round"
            stroke-dasharray="2 20" opacity=".9"/>

      <!-- done + current colored segment (top → node3) -->
      <path d="M201,80 C300,150 300,190 201,255"
            fill="none" stroke="#1E6BE0" stroke-width="27" stroke-linecap="round"/>
      <path d="M201,80 C300,150 300,190 201,255"
            fill="none" stroke="url(#tqPathDone)" stroke-width="18" stroke-linecap="round"/>
      <path d="M201,80 C300,150 300,190 201,255"
            fill="none" stroke="#BBD8FF" stroke-width="4" stroke-linecap="round"
            stroke-dasharray="1 16" opacity=".8"/>

      <!-- ===== Decorative props ===== -->
      <!-- cloud top -->
      <g filter="url(#tqSoft)" opacity=".95">
        <ellipse cx="70" cy="60" rx="26" ry="15" fill="#fff"/>
        <ellipse cx="92" cy="55" rx="20" ry="14" fill="#fff"/>
        <ellipse cx="52" cy="66" rx="16" ry="11" fill="#fff"/>
      </g>
      <g opacity=".9" filter="url(#tqSoft)">
        <ellipse cx="330" cy="115" rx="20" ry="12" fill="#fff"/>
        <ellipse cx="348" cy="110" rx="15" ry="11" fill="#fff"/>
      </g>

      <!-- tree left near node2 -->
      <g filter="url(#tqShadow)">
        <rect x="62" y="205" width="9" height="20" rx="4" fill="#8A5A32"/>
        <path d="M66 165c-20 6-30 24-24 40 4 11 16 16 24 12 8 4 20-1 24-12 6-16-4-34-24-40Z" fill="url(#tqTree)"/>
        <path d="M66 172c-12 4-19 15-15 26 3 7 10 9 15 6 4 3 12 1 15-6 4-11-3-22-15-26Z" fill="url(#tqTree2)" opacity=".85"/>
      </g>
      <!-- rock right near node3 -->
      <g filter="url(#tqSoft)">
        <path d="M300 262c-10 0-18 7-18 13 0 3 3 5 8 5h30c5 0 8-2 8-5 0-6-9-13-18-13Z" fill="url(#tqRock)"/>
        <path d="M300 264c-6 0-12 4-13 8h26c-1-4-7-8-13-8Z" fill="#CFD8E0" opacity=".7"/>
      </g>
      <!-- bush left bottom -->
      <g filter="url(#tqSoft)" opacity=".95">
        <ellipse cx="78" cy="470" rx="20" ry="13" fill="#2CAE6B"/>
        <ellipse cx="95" cy="466" rx="15" ry="11" fill="#3FBE7A"/>
        <ellipse cx="63" cy="474" rx="12" ry="9" fill="#26A061"/>
      </g>
      <!-- tree right bottom -->
      <g filter="url(#tqShadow)" opacity=".9">
        <rect x="322" y="548" width="8" height="18" rx="4" fill="#8A5A32"/>
        <path d="M326 512c-16 5-24 20-19 33 3 9 13 13 19 9 6 4 16-0 19-9 5-13-3-28-19-33Z" fill="url(#tqTree)"/>
      </g>
      <!-- small flowers -->
      <g opacity=".9">
        <circle cx="130" cy="330" r="4" fill="#FF8FB0"/><circle cx="130" cy="330" r="1.6" fill="#FFE066"/>
        <circle cx="285" cy="405" r="4" fill="#8FB4FF"/><circle cx="285" cy="405" r="1.6" fill="#FFE066"/>
        <circle cx="150" cy="520" r="4" fill="#FFB84D"/><circle cx="150" cy="520" r="1.6" fill="#fff"/>
      </g>

      <!-- ============ NODES ============ -->
      <!-- NODE 1 : DONE (gold, star) @ 201,80 -->
      <g filter="url(#tqShadow)">
        <ellipse cx="201" cy="98" rx="34" ry="10" fill="#12202D" opacity=".14"/>
        <circle cx="201" cy="80" r="34" fill="url(#tqGoldRim)"/>
        <circle cx="201" cy="80" r="27" fill="url(#tqGold)"/>

        <ellipse cx="201" cy="273" rx="34" ry="10" fill="#12202D" opacity=".14"/>
        <circle cx="201" cy="255" r="34" fill="url(#tqGoldRim)"/>
        <circle cx="201" cy="255" r="27" fill="url(#tqGold)"/>
        <path d="M175 245a26 26 0 0 1 52 0Z" fill="#fff" opacity=".28"/>
        <path d="M201 239l4.6 9.3 10.3 1.5-7.4 7.3 1.7 10.2-9.2-4.8-9.2 4.8 1.7-10.2-7.4-7.3 10.3-1.5Z" fill="#fff"/>
      </g>
      <g filter="url(#tqSoft)"><circle cx="228" cy="235" r="11" fill="#12B886"/>
        <path d="M223 235l3.4 3.4 6-6.4" stroke="#fff" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>

      <!-- NODE 3 : CURRENT (blue, big, pulse ring) @ 201,420 -->
      <circle cx="201" cy="420" r="47" fill="#3182F6" opacity=".12"/>
      <circle cx="201" cy="420" r="47" fill="none" stroke="#3182F6" stroke-width="2.5" opacity=".35"/>
      <g filter="url(#tqShadow)">
        <ellipse cx="201" cy="444" rx="40" ry="12" fill="#12202D" opacity=".18"/>
        <circle cx="201" cy="420" r="40" fill="url(#tqBlueRim)"/>
        <circle cx="201" cy="420" r="32" fill="url(#tqBlue)"/>
        <path d="M170 408a31 31 0 0 1 62 0Z" fill="#fff" opacity=".32"/>
        <!-- flag / play glyph -->
        <path d="M192 404v33" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        <path d="M192 405h18l-4 6 4 6h-18Z" fill="#fff"/>

      <!-- NODE 4 : LOCKED @ 201,585 -->

        <path d="M180 577a21 21 0 0 1 42 0Z" fill="#fff" opacity=".5"/>
        <rect x="192" y="583" width="18" height="14" rx="3" fill="#98A2AD"/>
        <path d="M195 583v-4a6 6 0 0 1 12 0v4" fill="none" stroke="#98A2AD" stroke-width="3"/>
      </g>

    <!-- HTML overlay labels for crisp korean -->
    <div class="tq-node-label" style="left:50%;top:118px;">
      <div class="t">과학적 탐구 방법</div><div class="s" style="color:#F2A81E;">★★★ 완료</div>
    </div>

    <a><span class="ni"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#B0B8C1" stroke-width="2.2"/><path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke="#B0B8C1" stroke-width="2.2" stroke-linecap="round"/></svg></span>프로필</a>
