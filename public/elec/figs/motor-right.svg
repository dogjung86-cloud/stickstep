<svg viewBox="0 0 400 184" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- 전동기 코일 '오른쪽 변' 속컷(400×184, hs-photo 크롭 비율) — 전류 뒤쪽(↗) → 힘 아래(↓).
       하단 y≈146 아래는 캡션 필 영역 — 힘 화살촉을 y144 안에서 마무리. -->
  <defs>
    <linearGradient id="mrWire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8A05E"/><stop offset=".5" stop-color="#C97F3A"/><stop offset="1" stop-color="#8A5322"/>
    </linearGradient>
    <linearGradient id="mrBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFEFF"/><stop offset="1" stop-color="#EDF2F9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="184" fill="url(#mrBg)"/>
  <!-- 자기장(N→S, 왼→오) 2줄 -->
  <g stroke="#E0452E" stroke-width="4.5" opacity=".5">
    <path d="M28 48H344M28 128H344"/>
  </g>
  <g fill="#E0452E" opacity=".5">
    <path d="M344 38l22 10-22 10z"/><path d="M344 118l22 10-22 10z"/>
  </g>
  <text x="16" y="30" font-family="Pretendard, sans-serif" font-size="15" font-weight="800" fill="#C4302B" stroke="#FFFFFF" stroke-width="5" paint-order="stroke">자기장 (N→S)</text>
  <!-- 코일 오른쪽 변(앞뒤 방향) -->
  <path d="M292 22 L162 162" stroke="#6E3F16" stroke-width="15"/>
  <path d="M292 22 L162 162" stroke="url(#mrWire)" stroke-width="11"/>
  <path d="M285 27 L176 144" stroke="#FFD9AE" stroke-width="2.6" opacity=".6"/>
  <!-- 전류(뒤쪽 ↗) — 왼쪽 변과 반대. 볼트 옐로 + 진갈색 테두리(구리 코일과 구분, 3차 피드백) -->
  <path d="M218 102 L252 66" stroke="#6E3F16" stroke-width="9.5"/>
  <path d="M218 102 L252 66" stroke="#FFD400" stroke-width="6"/>
  <path d="M245 54 L266 42 L259 69 Z" fill="#FFD400" stroke="#6E3F16" stroke-width="1.6"/>
  <text x="262" y="118" font-family="Pretendard, sans-serif" font-size="15.5" font-weight="800" fill="#8A6600" stroke="#FFFFFF" stroke-width="5" paint-order="stroke">전류 (뒤쪽으로)</text>
  <!-- 힘(아래 ↓) -->
  <path d="M230 92 V118" stroke="#0B9E96" stroke-width="8"/>
  <path d="M216 114 L230 142 L244 114 Z" fill="#0B9E96"/>
  <text x="246" y="140" font-family="Pretendard, sans-serif" font-size="17" font-weight="800" fill="#0B7285" stroke="#FFFFFF" stroke-width="5" paint-order="stroke">힘 (아래쪽!)</text>
</svg>
